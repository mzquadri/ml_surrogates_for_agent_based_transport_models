# Minimal cross-platform environment specification for thesis reproduction.
# For the full pinned environment (Linux, exact versions), see traffic-gnn.yml.
#
# Usage:
#   conda env create -f environment-minimal.yml
#   conda activate traffic-gnn
#
# Note: PyTorch CUDA version should match your GPU driver.
# For CPU-only, replace 'pytorch-cuda=11.8' with 'cpuonly'.

name: traffic-gnn
channels:
  - pyg
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - numpy>=1.26
  - pandas>=2.2
  - scipy>=1.12
  - scikit-learn>=1.4
  - matplotlib>=3.8
  - seaborn>=0.13
  - tqdm>=4.66
  - networkx>=3.2
  - pyyaml>=6.0
  - joblib>=1.3

  # PyTorch + CUDA
  - pytorch>=2.2
  - pytorch-cuda=11.8
  - torchaudio>=2.2
  - torchvision>=0.17

  # PyTorch Geometric (includes torch-scatter, torch-sparse, torch-cluster)
  - pyg>=2.5

  # Optional (used in training / logging)
  - wandb>=0.16
  - tensorboard>=2.16

  # Geospatial (used in data preprocessing)
  - geopandas>=0.14
  - shapely>=2.0

  - pip:
    - h5py>=3.12
    - lxml>=5.3
